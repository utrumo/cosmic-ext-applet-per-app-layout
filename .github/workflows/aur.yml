name: Update AUR

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

env:
  AUR_PKG: cosmic-ext-applet-per-app-layout-bin
  BIN_NAME: cosmic-ext-applet-per-app-layout

jobs:
  aur:
    name: Update AUR package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo -e "Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n  StrictHostKeyChecking accept-new" > ~/.ssh/config

      - name: Get release info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --json tagName -q .tagName)
          VERSION=${TAG#v}
          ARCHIVE="${BIN_NAME}-${TAG}-x86_64-linux.tar.gz"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ARCHIVE}"
          curl -sfL "${URL}" -o "${ARCHIVE}"
          SHA256=$(sha256sum "${ARCHIVE}" | cut -d' ' -f1)
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/${AUR_PKG}.git aur-repo

      - name: Update PKGBUILD
        run: |
          cd aur-repo
          cp ../aur/PKGBUILD .
          cp ../aur/${AUR_PKG}.install .
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

      # NOTE: .SRCINFO is generated inline because makepkg cannot run as root.
      # If PKGBUILD fields change (e.g. new depends/optdepends), update this template too.
      - name: Generate .SRCINFO
        run: |
          cd aur-repo
          cat > .SRCINFO << SRCINFO
          pkgbase = ${AUR_PKG}
          	pkgdesc = COSMIC panel applet that remembers keyboard layout for each application
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/${{ github.repository }}
          	install = ${AUR_PKG}.install
          	arch = x86_64
          	license = GPL-3.0-only
          	depends = libxkbcommon
          	options = !debug
          	provides = ${BIN_NAME}
          	conflicts = ${BIN_NAME}
          	source = https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${BIN_NAME}-v${VERSION}-x86_64-linux.tar.gz
          	sha256sums = ${SHA256}

          pkgname = ${AUR_PKG}
          SRCINFO
          sed -i 's/^          //' .SRCINFO

      - name: Push to AUR
        run: |
          cd aur-repo
          git config user.name "github-actions"
          git config user.email "github-actions@utrumo"
          git add PKGBUILD .SRCINFO ${AUR_PKG}.install
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update to ${VERSION}"
          git push
